services:
  # ─── Base de datos PostgreSQL ───
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sistema_ambiental}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
      # Pasamos estas variables explícitamente para el healthcheck interno
      DB_NAME: ${DB_NAME:-sistema_ambiental}
      DB_USER: ${DB_USER:-admin}

    ports:
      - "5433:5432"
    volumes:
      - ./database/esquema_envirosense.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seeds/01_geografia.sql:/docker-entrypoint-initdb.d/02_geografia.sql
      - ./database/seeds/01_sudamerica.sql:/docker-entrypoint-initdb.d/03_sudamerica.sql
      - ./database/seeds/02_umbrales.sql:/docker-entrypoint-initdb.d/04_umbrales.sql
      - ./database/seeds/geojson:/docker-entrypoint-initdb.d/geojson
      - ./database/seeds/load_geojson.sh:/docker-entrypoint-initdb.d/05_load_geojson.sh
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${DB_USER:-admin} -d $${DB_NAME:-sistema_ambiental}"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 300s


  # ─── Backend (API Node.js + Express) ───
  backend:
    build: ./Backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-sistema_ambiental}
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-admin123}
      JWT_SECRET: ${JWT_SECRET:-secret_para_tokens_envirosense_2026}
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: "*"
      # Variables de Notificación
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    volumes:
      - whatsapp_session:/app/.wwebjs_auth
    depends_on:
      db:
        condition: service_healthy

  # ─── Frontend (React + Vite) ───
  frontend:
    build: 
      context: ./Frontend
      args:
        - VITE_API_URL=http://${SERVER_IP:-localhost}:3000
        - VITE_MAPBOX_TOKEN=${VITE_MAPBOX_TOKEN}
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_MAPBOX_TOKEN=${VITE_MAPBOX_TOKEN}
      - VITE_API_URL=http://${SERVER_IP:-localhost}:3000
    depends_on:
      - backend
    command: npm run dev -- --host

# Volumen nombrado para persistir los datos
volumes:
  pgdata:
  whatsapp_session: