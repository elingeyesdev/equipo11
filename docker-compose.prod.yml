services:
  # ─── Base de datos PostgreSQL ───
  db:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: sistema_ambiental
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5433:5432"
    volumes:
      - ./database/esquema_envirosense.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seeds/01_sudamerica.sql:/docker-entrypoint-initdb.d/02_sudamerica.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sistema_ambiental"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ─── Backend (API Node.js + Express) ───
  backend:
    build: ./Backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: sistema_ambiental
      DB_USER: admin
      DB_PASSWORD: admin123
      JWT_SECRET: ${JWT_SECRET:-secret_para_tokens_envirosense_2026}
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: "*"
      # Variables de Notificación (Sincronizadas con tu .env)
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    volumes:
      - ./Backend/.whatsapp_session:/usr/src/app/.whatsapp_session
    depends_on:
      db:
        condition: service_healthy

  # ─── Frontend (React + Vite) ───
  frontend:
    build: 
      context: ./Frontend
      args:
        - VITE_API_URL=http://${SERVER_IP:-localhost}:3000
        - VITE_MAPBOX_TOKEN=${VITE_MAPBOX_TOKEN}
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_MAPBOX_TOKEN=${VITE_MAPBOX_TOKEN}
      - VITE_API_URL=http://${SERVER_IP:-localhost}:3000
    depends_on:
      - backend
    command: npm run dev -- --host

# Volumen nombrado para persistir los datos de PostgreSQL
volumes:
  pgdata:
  whatsapp_session:

